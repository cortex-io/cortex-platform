[pytest]
# Pytest configuration for Cortex Python unit tests

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html:../../coverage/unit/python/html
    --cov-report=term-missing
    --cov-report=json:../../coverage/unit/python/coverage.json
    --cov-report=lcov:../../coverage/unit/python/lcov.info
    --cov-fail-under=70
    --maxfail=5
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests (deselect with '-m "not unit"')
    integration: Integration tests (deselect with '-m "not integration"')
    slow: Slow running tests (deselect with '-m "not slow"')
    api: API endpoint tests
    database: Database operation tests
    redis: Redis operation tests
    mq: Message queue tests
    external: Tests requiring external services

# Coverage options
[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */virtualenv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
