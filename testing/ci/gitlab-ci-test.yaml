# GitLab CI/CD Pipeline for Cortex Testing

stages:
  - unit-test
  - integration-test
  - e2e-test
  - report

variables:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  DOCKER_DRIVER: overlay2

# Unit Tests - JavaScript
unit-test-js:
  stage: unit-test
  image: node:${NODE_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-npm
    paths:
      - testing/unit/js/node_modules/
  script:
    - cd testing/unit/js
    - npm ci
    - npm test -- --coverage
  artifacts:
    reports:
      junit: testing/coverage/unit/js/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: testing/coverage/unit/js/cobertura-coverage.xml
    paths:
      - testing/coverage/unit/js/
    expire_in: 7 days
  coverage: '/Lines\s*:\s*(\d+\.\d+)%/'

# Unit Tests - Python
unit-test-python:
  stage: unit-test
  image: python:${PYTHON_VERSION}-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-pip
    paths:
      - .cache/pip
  script:
    - cd testing/unit/python
    - pip install --cache-dir .cache/pip -r requirements.txt
    - pytest --cov --cov-report=xml --cov-report=term
  artifacts:
    reports:
      junit: testing/coverage/unit/python/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: testing/coverage/unit/python/coverage.xml
    paths:
      - testing/coverage/unit/python/
    expire_in: 7 days
  coverage: '/TOTAL.*\s+(\d+%)$/'

# Integration Tests - JavaScript
integration-test-js:
  stage: integration-test
  image: node:${NODE_VERSION}
  services:
    - name: redis:7-alpine
      alias: redis
    - name: postgres:16-alpine
      alias: postgres
      command: ["postgres", "-c", "fsync=off", "-c", "synchronous_commit=off"]
  variables:
    REDIS_HOST: redis
    REDIS_PORT: 6379
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: cortex_test
    POSTGRES_USER: cortex_test
    POSTGRES_PASSWORD: cortex_test_password
  script:
    - cd testing/integration/js
    - npm ci
    - npm test -- --coverage
  artifacts:
    paths:
      - testing/coverage/integration/js/
    expire_in: 7 days
  dependencies:
    - unit-test-js

# Integration Tests - Python
integration-test-python:
  stage: integration-test
  image: python:${PYTHON_VERSION}
  services:
    - name: redis:7-alpine
      alias: redis
    - name: postgres:16-alpine
      alias: postgres
  variables:
    REDIS_HOST: redis
    REDIS_PORT: 6379
    POSTGRES_HOST: postgres
    POSTGRES_PORT: 5432
    POSTGRES_DB: cortex_test
    POSTGRES_USER: cortex_test
    POSTGRES_PASSWORD: cortex_test_password
  script:
    - cd testing/integration/python
    - pip install -r requirements.txt
    - pytest --cov
  artifacts:
    paths:
      - testing/coverage/integration/python/
    expire_in: 7 days
  dependencies:
    - unit-test-python

# E2E Tests
e2e-test:
  stage: e2e-test
  image: node:${NODE_VERSION}
  services:
    - docker:dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - apk add --no-cache curl
    - curl -LO https://dl.k8s.io/release/v1.28.0/bin/linux/amd64/kubectl
    - chmod +x kubectl && mv kubectl /usr/local/bin/
  script:
    - cd testing/e2e/js
    - npm ci
    - npm test
  dependencies:
    - integration-test-js
    - integration-test-python
  only:
    - main
    - develop

# Coverage Report
coverage-report:
  stage: report
  image: alpine:latest
  script:
    - echo "Generating coverage report"
    - find testing/coverage -name "*.xml" -o -name "*.json"
  artifacts:
    paths:
      - testing/coverage/
    expire_in: 30 days
  dependencies:
    - unit-test-js
    - unit-test-python
    - integration-test-js
    - integration-test-python
