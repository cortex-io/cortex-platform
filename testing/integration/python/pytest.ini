[pytest]
# Pytest configuration for Cortex Python integration tests

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=html:../../coverage/integration/python/html
    --cov-report=term-missing
    --cov-report=json:../../coverage/integration/python/coverage.json
    --cov-report=lcov:../../coverage/integration/python/lcov.info
    --maxfail=3
    -n 2
    --disable-warnings

# Markers
markers =
    integration: Integration tests
    slow: Slow running tests
    redis: Tests requiring Redis
    postgres: Tests requiring PostgreSQL
    containers: Tests requiring testcontainers

# Timeout for integration tests
timeout = 60

[coverage:run]
source = .
omit =
    */tests/*
    */test_*
    */__pycache__/*
    */venv/*
    */virtualenv/*
    */.venv/*

[coverage:report]
precision = 2
show_missing = True
