[pytest]
# Pytest configuration for Cortex Python E2E tests

testpaths = tests
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Output options
addopts =
    --verbose
    --strict-markers
    --tb=short
    --maxfail=2
    --disable-warnings

# Markers
markers =
    e2e: End-to-end tests
    slow: Slow running tests
    k8s: Tests requiring Kubernetes
    critical: Critical path tests

# Timeout for E2E tests (2 minutes)
timeout = 120
