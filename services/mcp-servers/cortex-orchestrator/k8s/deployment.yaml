apiVersion: apps/v1
kind: Deployment
metadata:
  name: cortex-orchestrator
  namespace: cortex-system
  labels:
    app: cortex-orchestrator
    component: orchestration
    cortex.dev/managed: "true"
spec:
  replicas: 1  # Single orchestrator instance
  selector:
    matchLabels:
      app: cortex-orchestrator
  strategy:
    type: Recreate  # Only one orchestrator at a time
  template:
    metadata:
      labels:
        app: cortex-orchestrator
        component: orchestration
        cortex.dev/managed: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: cortex-orchestrator

      containers:
      - name: orchestrator
        image: 10.43.170.72:5000/cortex-orchestrator:latest
        imagePullPolicy: Always

        ports:
        - name: mcp
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP

        env:
        # Pod identity
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName

        # Awareness MCP server connection
        - name: AWARENESS_URL
          value: "http://cortex-awareness.cortex-system.svc.cluster.local:8080"

        # Commit-relay connection (optional)
        - name: COMMIT_RELAY_URL
          value: "http://commit-relay.cortex-system.svc.cluster.local:8000"

        # Configuration from ConfigMap
        - name: CONFIG_PATH
          value: "/etc/orchestrator/config.yaml"

        # Logging
        - name: LOG_LEVEL
          value: "INFO"
        - name: LOG_FORMAT
          value: "json"

        resources:
          requests:
            cpu: 200m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi

        livenessProbe:
          httpGet:
            path: /health
            port: mcp
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /ready
            port: mcp
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 2

        volumeMounts:
        - name: config
          mountPath: /etc/orchestrator
          readOnly: true

        # Security context
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL

      volumes:
      - name: config
        configMap:
          name: cortex-orchestrator-config

      # Pod-level security
      securityContext:
        fsGroup: 1000

      # Scheduling constraints
      affinity:
        # Prefer to run on master nodes (more stable)
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: Exists

        # Anti-affinity with other orchestrators (shouldn't happen with replicas=1)
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: cortex-orchestrator
            topologyKey: kubernetes.io/hostname

      tolerations:
      # Can run on master nodes
      - key: node-role.kubernetes.io/master
        operator: Exists
        effect: NoSchedule
---
apiVersion: v1
kind: Service
metadata:
  name: cortex-orchestrator
  namespace: cortex-system
  labels:
    app: cortex-orchestrator
    component: orchestration
spec:
  type: ClusterIP
  selector:
    app: cortex-orchestrator
  ports:
  - name: mcp
    port: 8080
    targetPort: mcp
    protocol: TCP
  - name: metrics
    port: 9090
    targetPort: metrics
    protocol: TCP
  sessionAffinity: ClientIP  # Sticky sessions for MCP clients
