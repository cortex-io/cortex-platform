apiVersion: v1
kind: ServiceAccount
metadata:
  name: cortex-orchestrator
  namespace: cortex-system
  labels:
    app: cortex-orchestrator
    component: orchestration
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cortex-orchestrator
  labels:
    app: cortex-orchestrator
    component: orchestration
rules:
# Pod lifecycle management
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch", "create", "delete", "patch"]

# Pod logs for liveness checks
- apiGroups: [""]
  resources: ["pods/log"]
  verbs: ["get"]

# Pod exec for checkpoint signals
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]

# Pod status updates
- apiGroups: [""]
  resources: ["pods/status"]
  verbs: ["get", "list", "watch"]

# Node information for capacity calculations
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]

# Node metrics for resource usage
- apiGroups: [""]
  resources: ["nodes/stats"]
  verbs: ["get"]

# Events for stability assessment
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]

# ConfigMaps for agent profiles
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch"]

# Deployments for spawn operations
- apiGroups: ["apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch", "patch", "update"]

# ReplicaSets for pod parent tracking
- apiGroups: ["apps"]
  resources: ["replicasets"]
  verbs: ["get", "list", "watch"]

# StatefulSets for stateful agent tracking
- apiGroups: ["apps"]
  resources: ["statefulsets"]
  verbs: ["get", "list", "watch", "patch", "update"]

# DaemonSets for system agent tracking
- apiGroups: ["apps"]
  resources: ["daemonsets"]
  verbs: ["get", "list", "watch"]

# Metrics API for resource usage
- apiGroups: ["metrics.k8s.io"]
  resources: ["nodes", "pods"]
  verbs: ["get", "list"]

# Custom metrics (if available)
- apiGroups: ["custom.metrics.k8s.io"]
  resources: ["*"]
  verbs: ["get", "list"]

# PersistentVolumeClaims for state preservation
- apiGroups: [""]
  resources: ["persistentvolumeclaims"]
  verbs: ["get", "list", "watch"]

# Resource quotas for capacity planning
- apiGroups: [""]
  resources: ["resourcequotas"]
  verbs: ["get", "list", "watch"]

# Limit ranges for default limits
- apiGroups: [""]
  resources: ["limitranges"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cortex-orchestrator
  labels:
    app: cortex-orchestrator
    component: orchestration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cortex-orchestrator
subjects:
- kind: ServiceAccount
  name: cortex-orchestrator
  namespace: cortex-system
---
# Additional role for namespace-specific operations
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cortex-orchestrator-namespace
  namespace: cortex-system
  labels:
    app: cortex-orchestrator
    component: orchestration
rules:
# Secrets for agent credentials (state preservation)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]

# ServiceAccounts for spawned agents
- apiGroups: [""]
  resources: ["serviceaccounts"]
  verbs: ["get", "list", "watch"]

# ConfigMaps for agent configuration
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cortex-orchestrator-namespace
  namespace: cortex-system
  labels:
    app: cortex-orchestrator
    component: orchestration
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cortex-orchestrator-namespace
subjects:
- kind: ServiceAccount
  name: cortex-orchestrator
  namespace: cortex-system
