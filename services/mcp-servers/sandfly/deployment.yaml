---
# Namespace
apiVersion: v1
kind: Namespace
metadata:
  name: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-sandfly
---
# Secret for Sandfly credentials
apiVersion: v1
kind: Secret
metadata:
  name: sandfly-credentials
  namespace: mcp-servers
type: Opaque
stringData:
  SANDFLY_HOST: "10.88.140.176"
  SANDFLY_USERNAME: "admin"
  SANDFLY_PASSWORD: "emphasize-art-nibble-arguable-paradox-flick-unpack"
---
# ConfigMap for non-sensitive config
apiVersion: v1
kind: ConfigMap
metadata:
  name: sandfly-config
  namespace: mcp-servers
data:
  SANDFLY_VERIFY_SSL: "false"
---
# Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sandfly
  namespace: mcp-servers
  labels:
    app.kubernetes.io/name: mcp-sandfly
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mcp-sandfly
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mcp-sandfly
      annotations:
        prometheus.io/scrape: "false"
    spec:
      serviceAccountName: mcp-sandfly
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: mcp-sandfly
          image: ghcr.io/ry-ops/mcp-sandfly:latest
          imagePullPolicy: Always
          envFrom:
            - secretRef:
                name: sandfly-credentials
            - configMapRef:
                name: sandfly-config
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "256Mi"
              cpu: "500m"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          # MCP servers are stdio-based, so no ports/probes needed
          # If you need health checks, add a simple endpoint
---
# ServiceAccount
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-sandfly
  namespace: mcp-servers
---
# NetworkPolicy - restrict egress to Sandfly server only
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: mcp-sandfly-egress
  namespace: mcp-servers
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: mcp-sandfly
  policyTypes:
    - Egress
  egress:
    # Allow DNS
    - to: []
      ports:
        - protocol: UDP
          port: 53
    # Allow HTTPS to Sandfly server
    # Update with your Sandfly server IP/CIDR
    - to:
        - ipBlock:
            cidr: 10.0.0.0/8  # Adjust to your network
      ports:
        - protocol: TCP
          port: 443
