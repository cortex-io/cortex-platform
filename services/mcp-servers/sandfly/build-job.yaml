apiVersion: v1
kind: ConfigMap
metadata:
  name: dockerhub-config
  namespace: default
data:
  config.json: |
    {
      "auths": {
        "https://index.docker.io/v1/": {}
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-sandfly-build
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--context=/workspace"
          - "--dockerfile=/workspace/Dockerfile"
          - "--destination=ryops/mcp-sandfly:latest"
          - "--cache=true"
          - "--skip-tls-verify"
          - "--verbosity=debug"
        env:
          - name: DOCKER_CONFIG
            value: /kaniko/.docker
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: docker-config
            mountPath: /kaniko/.docker
      volumes:
        - name: workspace
          hostPath:
            path: /Users/ryandahlberg/Desktop/sandfly
            type: Directory
        - name: docker-config
          configMap:
            name: dockerhub-config
