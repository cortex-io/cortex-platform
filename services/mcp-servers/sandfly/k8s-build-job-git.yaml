apiVersion: v1
kind: ConfigMap
metadata:
  name: dockerhub-config
  namespace: default
data:
  config.json: |
    {
      "auths": {
        "https://index.docker.io/v1/": {}
      }
    }
---
apiVersion: batch/v1
kind: Job
metadata:
  name: kaniko-sandfly-build
  namespace: default
spec:
  ttlSecondsAfterFinished: 3600
  template:
    spec:
      restartPolicy: Never
      initContainers:
      - name: git-clone
        image: alpine/git:latest
        command:
          - sh
          - -c
          - |
            git clone https://github.com/ry-ops/cortex.git /workspace-temp || \
            git clone file:///cortex-repo /workspace-temp || \
            (echo "ERROR: Could not clone repo"; exit 1)
            cp -r /workspace-temp/mcp-servers/sandfly/* /workspace/
            ls -la /workspace/
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: cortex-repo
            mountPath: /cortex-repo
            readOnly: true
      containers:
      - name: kaniko
        image: gcr.io/kaniko-project/executor:latest
        args:
          - "--context=/workspace"
          - "--dockerfile=/workspace/Dockerfile"
          - "--destination=ryops/mcp-sandfly:latest"
          - "--cache=true"
          - "--skip-tls-verify"
          - "--verbosity=debug"
        env:
          - name: DOCKER_CONFIG
            value: /kaniko/.docker
        volumeMounts:
          - name: workspace
            mountPath: /workspace
          - name: docker-config
            mountPath: /kaniko/.docker
      volumes:
        - name: workspace
          emptyDir: {}
        - name: cortex-repo
          hostPath:
            path: /Users/ryandahlberg/Projects/cortex
            type: Directory
        - name: docker-config
          configMap:
            name: dockerhub-config
