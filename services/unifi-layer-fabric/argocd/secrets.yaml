# =============================================================================
# UniFi Credentials Secret
# =============================================================================
# Create this secret BEFORE deploying the layer fabric.
#
# Option 1: kubectl create secret
# kubectl create secret generic unifi-credentials \
#   --namespace cortex-unifi \
#   --from-literal=api-key="YOUR_SITE_MANAGER_API_KEY" \
#   --from-literal=controller-host="https://192.168.1.1" \
#   --from-literal=controller-username="admin" \
#   --from-literal=controller-password="YOUR_PASSWORD" \
#   --from-literal=ssh-host="192.168.1.1" \
#   --from-literal=ssh-username="root" \
#   --from-literal=ssh-password="YOUR_SSH_PASSWORD"
#
# Option 2: Sealed Secrets (recommended for GitOps)
# kubeseal --format yaml < secret.yaml > sealed-secret.yaml
#
# Option 3: External Secrets Operator
# See external-secret.yaml template below
# =============================================================================

---
# Plain secret (DO NOT commit to git with real values)
apiVersion: v1
kind: Secret
metadata:
  name: unifi-credentials
  namespace: cortex-unifi
  labels:
    app.kubernetes.io/part-of: unifi-layer-fabric
type: Opaque
stringData:
  # Site Manager API (cloud)
  api-key: "REPLACE_ME"
  
  # Network Application API (local controller)
  controller-host: "https://192.168.1.1"
  controller-username: "admin"
  controller-password: "REPLACE_ME"
  
  # SSH (UDM Pro direct access)
  ssh-host: "192.168.1.1"
  ssh-username: "root"
  ssh-password: "REPLACE_ME"

