apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/part-of: chat-layer-fabric
    cortex.ry-ops.dev/fabric: chat
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ .Chart.Name }}
        app.kubernetes.io/part-of: chat-layer-fabric
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.metrics.port }}"
        prometheus.io/path: "{{ .Values.metrics.path }}"
    spec:
      containers:
        # Main reasoning service
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          env:
            - name: DMR_ENDPOINT
              value: "{{ .Values.dmr.endpoint }}"
            - name: DMR_MODEL
              value: "{{ .Values.dmr.model }}"
            - name: DMR_CONTEXT_LENGTH
              value: "{{ .Values.dmr.contextLength }}"
            - name: DMR_TEMPERATURE
              value: "{{ .Values.dmr.temperature }}"
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}

        {{- if .Values.dmrSidecar.enabled }}
        # Docker Model Runner sidecar
        - name: dmr
          image: "{{ .Values.dmrSidecar.image.repository }}:{{ .Values.dmrSidecar.image.tag }}"
          ports:
            - name: dmr
              containerPort: 12434
              protocol: TCP
          env:
            - name: DMR_MODEL
              value: "{{ .Values.dmr.model }}"
          volumeMounts:
            - name: model-storage
              mountPath: /models
          resources:
            {{- toYaml .Values.dmrSidecar.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 12434
            initialDelaySeconds: 60
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 12434
            initialDelaySeconds: 30
            periodSeconds: 10
        {{- end }}

      {{- if .Values.persistence.enabled }}
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ .Chart.Name }}-models
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
---
{{- if .Values.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ .Chart.Name }}-models
  namespace: {{ .Values.global.namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
spec:
  accessModes:
    - {{ .Values.persistence.accessMode }}
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
{{- end }}
---
{{- if .Values.keda.enabled }}
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: {{ .Chart.Name }}
  namespace: {{ .Values.global.namespace }}
spec:
  scaleTargetRef:
    name: {{ .Chart.Name }}
  minReplicaCount: {{ .Values.keda.minReplicaCount }}
  maxReplicaCount: {{ .Values.keda.maxReplicaCount }}
  cooldownPeriod: {{ .Values.keda.cooldownPeriod }}
  pollingInterval: {{ .Values.keda.pollingInterval }}
  triggers:
    - type: {{ .Values.keda.trigger.type }}
      metadata:
        {{- toYaml .Values.keda.trigger.metadata | nindent 8 }}
{{- end }}
