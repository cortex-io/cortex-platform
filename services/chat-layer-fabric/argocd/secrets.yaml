# =============================================================================
# Chat Layer Fabric Secrets
# =============================================================================
# The Chat Layer Fabric reuses the existing Anthropic API key from
# cortex-chat namespace. The secret is already created there.
#
# EXISTING SECRET LOCATION:
#   Namespace: cortex-chat
#   Secret Name: cortex-chat-secrets
#   Key: anthropic-api-key
#
# OPTION 1: Copy the existing secret to cortex-chat namespace (if different)
# kubectl get secret cortex-chat-secrets -n cortex-chat -o yaml | \
#   sed 's/namespace: cortex-chat/namespace: cortex-chat/' | \
#   kubectl apply -f -
#
# OPTION 2: Create new secret (if needed)
# kubectl create secret generic cortex-chat-secrets \
#   --namespace cortex-chat \
#   --from-literal=anthropic-api-key="sk-ant-api03-..."
#
# OPTION 3: Reference from External Secrets Operator (recommended for prod)
# =============================================================================

---
# Chat Layer Fabric uses the SAME namespace (cortex-chat) as the existing
# moe-router deployment, so no secret copying is needed. The secret
# cortex-chat-secrets already exists with the anthropic-api-key.

# For reference, here's the secret structure expected by the fabric layers:
# apiVersion: v1
# kind: Secret
# metadata:
#   name: cortex-chat-secrets
#   namespace: cortex-chat
# type: Opaque
# stringData:
#   anthropic-api-key: "sk-ant-api03-..."

---
# If using External Secrets Operator:
# apiVersion: external-secrets.io/v1beta1
# kind: ExternalSecret
# metadata:
#   name: cortex-chat-secrets
#   namespace: cortex-chat
# spec:
#   refreshInterval: 1h
#   secretStoreRef:
#     name: vault-backend
#     kind: ClusterSecretStore
#   target:
#     name: cortex-chat-secrets
#     creationPolicy: Owner
#   data:
#     - secretKey: anthropic-api-key
#       remoteRef:
#         key: secret/cortex/anthropic
#         property: api-key
